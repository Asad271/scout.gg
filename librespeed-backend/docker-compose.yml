version: '3.8'

# LibreSpeed Self-Hosted Server for Scout.gg
# Run: docker-compose up -d

services:
  # Frontend (speed test UI)
  frontend:
    image: ghcr.io/librespeed/speedtest:latest
    container_name: librespeed-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      - TITLE=Scout.gg Speed Test
      - MESSAGE=Test your internet speed for gaming
      
  # Backend (stores results, optional)
  backend:
    image: ghcr.io/librespeed/speedtest-backend:latest
    container_name: librespeed-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - DB_TYPE=sqlite
      - DB_SQLITE_FILENAME=/data/results.db
    volumes:
      - backend_data:/data

volumes:
  backend_data:
